services:
  # The Insider Detector API + Dashboard + Indexer
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:poly123@db:5432/polymarket
      - REDIS_URL=redis://redis:6379/0
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=poly123
      - CLICKHOUSE_DB=polymarket
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-poly_app}:${RABBITMQ_DEFAULT_PASS:-poly_local_password}@rabbitmq:5672/
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      clickhouse:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  # Redis for hot-caching and session state
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # RabbitMQ for robust task queuing
  rabbitmq:
    image: rabbitmq:3-management-alpine
    hostname: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-poly_app}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-poly_local_password}
      - RABBITMQ_ERLANG_COOKIE=${RABBITMQ_ERLANG_COOKIE:-poly_local_erlang_cookie}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ClickHouse for high-speed trade analytics (OLAP)
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123" # HTTP interface
      - "9000:9000" # Native interface
    environment:
      - CLICKHOUSE_DB=polymarket
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=poly123
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 2s
      timeout: 5s
      retries: 20

  # Background Worker (TaskIQ)
  worker:
    build: .
    command: taskiq worker worker_entrypoint:broker --reload
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:poly123@db:5432/polymarket
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=poly123
      - CLICKHOUSE_DB=polymarket
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-poly_app}:${RABBITMQ_DEFAULT_PASS:-poly_local_password}@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  # Live Trade Indexer & Pipeline
  indexer:
    build: .
    command: python scripts/run_pipeline.py --max-trades 0 --live
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:poly123@db:5432/polymarket
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=poly123
      - CLICKHOUSE_DB=polymarket
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  # Database
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=poly123
      - POSTGRES_DB=polymarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d polymarket"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
